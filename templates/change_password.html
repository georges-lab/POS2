{% extends 'base.html' %}
{% block title %}Security Settings - BizTool POS{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <a href="{{ url_for('dashboard') }}" class="btn btn-link text-decoration-none text-muted mb-4 p-0">
                <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
            </a>

            <div class="card shadow-lg border-0 rounded-4 overflow-hidden animate__animated animate__fadeInUp">
                <div class="card-header border-0 bg-dark py-4 text-center">
                    <div class="mb-2">
                        <div class="d-inline-flex align-items-center justify-content-center bg-emerald-soft rounded-circle" 
                             style="width: 60px; height: 60px; background: rgba(0, 255, 136, 0.1);">
                            <i class="bi bi-shield-lock-fill text-success fs-3"></i>
                        </div>
                    </div>
                    <h4 class="fw-bold text-white mb-0">Change Password</h4>
                    <p class="text-muted small mb-0">Keep your account secure with a strong password</p>
                </div>

                <div class="card-body p-4 p-lg-5 bg-white">
                    <form method="POST">
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase text-muted" for="current_password">
                                <i class="bi bi-key-fill me-1"></i> Current Password
                            </label>
                            <input type="password" 
                                   class="form-control form-control-lg border-0 bg-light shadow-none" 
                                   name="current_password" 
                                   placeholder="••••••••"
                                   required>
                        </div>

                        <hr class="my-4 opacity-25">

                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase text-muted" for="new_password">
                                <i class="bi bi-plus-circle-fill me-1"></i> New Password
                            </label>
                            <input type="password" 
                                   class="form-control form-control-lg border-0 bg-light shadow-none" 
                                   name="new_password" 
                                   placeholder="Enter new password"
                                   required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase text-muted" for="confirm_password">
                                <i class="bi bi-check-circle-fill me-1"></i> Confirm New Password
                            </label>
                            <input type="password" 
                                   class="form-control form-control-lg border-0 bg-light shadow-none" 
                                   name="confirm_password" 
                                   placeholder="Re-type new password"
                                   required>
                        </div>

                        <div class="d-grid gap-2 mt-5">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-3 py-3 border-0 shadow-sm"
                                    style="background: var(--biz-emerald); color: var(--biz-dark);">
                                Update Password <i class="bi bi-arrow-right ms-2"></i>
                            </button>
                            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-light text-muted btn-sm border-0">
                                I've changed my mind
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <div class="text-center mt-4">
                <p class="text-muted small">
                    <i class="bi bi-info-circle me-1"></i> You will stay logged in after changing your password.
                </p>
            </div>
        </div>
    </div>
</div>

<style>
    /* Styling for the large input fields */
    .form-control-lg {
        border-radius: 12px !important;
        font-size: 1rem;
        padding: 0.75rem 1rem;
        transition: all 0.3s ease;
    }
    
    .form-control-lg:focus {
        background: #fff !important;
        box-shadow: 0 0 0 4px rgba(0, 255, 136, 0.15) !important;
        border: 1px solid var(--biz-emerald) !important;
    }

    /* Professional Card Entry Animation */
    .animate__fadeInUp {
        animation-duration: 0.6s;
    }
</style>
{% endblock %}
