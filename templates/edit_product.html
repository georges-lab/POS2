{% extends "base.html" %}

{% block title %}Edit Product | POS System{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 pt-4">
                    <h3 class="fw-bold text-dark mb-0">
                        <i class="bi bi-pencil-square text-primary me-2"></i> Edit Product
                    </h3>
                    <p class="text-muted small">Updating: <span class="text-primary fw-semibold">{{ product.name }}</span></p>
                </div>
                
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('edit_product', id=product.id) }}">
                        
                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold small">Product Name</label>
                            <input type="text" class="form-control border-light shadow-none" id="name" name="name" value="{{ product.name }}" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="category" class="form-label fw-bold small">Category</label>
                                <input type="text" class="form-control border-light shadow-none" id="category" name="category" value="{{ product.category }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="quantity" class="form-label fw-bold small">Current Stock</label>
                                <input type="number" class="form-control border-light shadow-none" id="quantity" name="quantity" value="{{ product.quantity }}" required>
                            </div>
                        </div>

                        <hr class="my-4 text-light">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="buying_price" class="form-label fw-bold small text-secondary">Buying Price (Cost)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-light text-muted">Ksh</span>
                                    <input type="number" step="0.01" class="form-control border-light shadow-none" id="buying_price" name="buying_price" value="{{ product.buying_price or 0 }}" required>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="selling_price" class="form-label fw-bold small text-success">Selling Price (Retail)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-soft-success border-light text-success">Ksh</span>
                                    <input type="number" step="0.01" class="form-control border-light shadow-none" id="selling_price" name="selling_price" value="{{ product.selling_price or 0 }}" required>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="barcode" class="form-label fw-bold small">Barcode</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-light text-muted"><i class="bi bi-upc-scan"></i></span>
                                <input type="text" name="barcode" id="barcode" class="form-control border-light shadow-none" value="{{ product.barcode or '' }}" placeholder="Scan barcode">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="expiry_date" class="form-label fw-bold small">Expiry Date</label>
                            <input type="date" name="expiry_date" id="expiry_date" class="form-control border-light shadow-none" value="{{ product.expiry_date.strftime('%Y-%m-%d') if product.expiry_date else '' }}">
                        </div>

                        <div class="alert alert-light border-warning mb-4 py-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="fw-bold text-dark mb-1 small"><i class="bi bi-calendar-x me-1"></i>Stock Cleanup</h6>
                                    <p class="text-muted smaller mb-0">Clear stock due to expiry or damage.</p>
                                </div>
                                <button type="button" class="btn btn-outline-danger btn-sm fw-bold px-3 rounded-pill" onclick="markAsWaste()">
                                    Mark as Waste
                                </button>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary py-2 fw-bold shadow-sm">
                                <i class="bi bi-cloud-arrow-up me-2"></i> Update Product Details
                            </button>
                            <a href="{{ url_for('products') }}" class="btn btn-link text-muted text-decoration-none small mt-2">
                                <i class="bi bi-arrow-left me-1"></i> Cancel Changes
                            </a>
                        </div>
                    </form> <form id="wasteForm" method="POST" action="{{ url_for('mark_product_waste', id=product.id) }}" style="display: none;">
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
function markAsWaste() {
    if (confirm("Are you sure? This will set stock to 0 and record this as a business loss.")) {
        document.getElementById('wasteForm').submit();
    }
}
</script>

<style>
    .bg-soft-success { background-color: #e8fadf; }
    .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.05); }
    .smaller { font-size: 0.75rem; }
</style>
{% endblock %}
